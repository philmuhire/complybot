# Pushes to main: Terraform (if not skipped) + build linux/amd64 API image in CI → ECR,
# App Runner auto-deploys + static Next build → S3 + CloudFront invalidation.
# Your Mac (arm64) is not used for the image: ubuntu-latest is native amd64.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Terraform workspace (dev / test / prod)"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - test
          - prod

concurrency:
  group: deploy-${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'main' }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'dev' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          role-session-name: capstone-github-deploy
          aws-region: ${{ secrets.DEFAULT_AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Paste your full local infra/terraform/terraform.tfvars into the GitHub secret TERRAFORM_TFVARS
      - name: Write infra/terraform/terraform.tfvars from TERRAFORM_TFVARS
        if: ${{ hashFiles('infra/terraform/terraform.tfvars') == '' }}
        working-directory: infra/terraform
        env:
          TERRAFORM_TFVARS: ${{ secrets.TERRAFORM_TFVARS }}
        run: |
          if [ -z "${TERRAFORM_TFVARS:-}" ]; then
            echo "::error::Set repository secret TERRAFORM_TFVARS to the same content as your local Terraform tfvars, or commit a non-secret copy at infra/terraform/terraform.tfvars"
            exit 1
          fi
          printf '%s' "$TERRAFORM_TFVARS" > terraform.tfvars

      - name: Deploy (terraform + ECR image + frontend to S3)
        run: |
          chmod +x scripts/deploy.sh scripts/bootstrap-terraform-state.sh
          echo "linux/amd64 build on runner → ECR → App Runner; Next static → S3/CloudFront."
          ./scripts/deploy.sh \
            "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.environment || 'dev' }}" \
            "${{ vars.PROJECT_NAME || 'compliance' }}"
        env:
          CI: "true"
          SKIP_DOCKER_PUSH: "0"
          SKIP_TERRAFORM: "0"
          SKIP_FRONTEND: "0"
          DEFAULT_AWS_REGION: ${{ secrets.DEFAULT_AWS_REGION }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${{ vars.NEXT_PUBLIC_CLERK_SIGN_IN_URL }}
          NEXT_PUBLIC_CLERK_SIGN_UP_URL: ${{ vars.NEXT_PUBLIC_CLERK_SIGN_UP_URL }}
          NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL: ${{ vars.NEXT_PUBLIC_CLERK_AFTER_SIGN_IN_URL }}
