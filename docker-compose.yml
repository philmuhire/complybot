services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: compliance
      POSTGRES_PASSWORD: compliance
      POSTGRES_DB: compliance
    # Host 5433 → container 5432 (Postgres always listens on 5432 inside the image)
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U compliance -d compliance"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
